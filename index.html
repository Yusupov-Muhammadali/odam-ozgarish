<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
        margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            max-width: 1240px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
        }
        .wrapper {
            padding-top: 100px;
            padding-bottom: 100px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .js-avatar {
            width: 400px;
            height: 400px;
            border-radius: 50%;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        button img {
            width: 150px;
            height: 150px;
        }

        button {
            border: none;
            border-radius: 50%;
            overflow: hidden;
        }

    </style>
</head>
<body>

    <main>
        <section>
            <div class="container wrapper">
                <div class="avatar">
                    <img src="./1.png" alt="" class="js-avatar">
                </div>
                <div class="buttons">
                    <button class="js-avatar-1"><img src="./1.png" alt=""></button>
                    <button class="js-avatar-2"><img src="./2.png" alt=""></button>
                    <button class="js-avatar-3"><img src="./3.png" alt=""></button>
                    <button class="js-avatar-4"><img src="./4.png" alt=""></button>
                    <button class="js-avatar-5"><img src="./5.png" alt=""></button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const elAvatar = document.querySelector(".js-avatar")
        const elAvatar1 = document.querySelector(".js-avatar-1")
        const elAvatar2= document.querySelector(".js-avatar-2")
        const elAvatar3= document.querySelector(".js-avatar-3")
        const elAvatar4= document.querySelector(".js-avatar-4")
        const elAvatar5= document.querySelector(".js-avatar-5")

        elAvatar1.addEventListener("click", function(){
            elAvatar.src  = "/1.png"
        })


        elAvatar2.addEventListener("click", function(){
            elAvatar.src  = "/2.png"
        })

            elAvatar3.addEventListener("click", function(){
            elAvatar.src  = "/3.png"
        })

            elAvatar4.addEventListener("click", function(){
            elAvatar.src  = "/4.png"
        })
            elAvatar5.addEventListener("click", function(){
            elAvatar.src  = "/5.png"
        })
    </script>
</body>
</html>
